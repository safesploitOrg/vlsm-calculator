<!DOCTYPE html>

<html lang="en">

<head>
  <title>VLSM Table Generator</title>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="styles/footer.css">
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/form.css">
  <link rel="stylesheet" href="styles/label-float.css">
  <link rel="stylesheet" href="styles/table.css">

  <script src="scripts/namespaces.js" defer></script>
  <script src="scripts/value-getters.js" defer></script>

  <script src="scripts/templates/utils.js" defer></script>
  <script src="scripts/templates/table-template.js" defer></script>
  <script src="scripts/templates/subnet-list-template.js" defer></script>

  <script src="scripts/validation.js" defer></script>
  <script src="scripts/ip-operations.js" defer></script>
  <script src="scripts/vlsm-table.js" defer></script>
  <script src="scripts/buttons.js" defer></script>
  <script src="scripts/populate.js" defer></script>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Table Columns</legend>
        <div class="form-multicheckbox">
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-name" checked>
            <label for="checkbox-name">name</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-size">
            <label for="checkbox-size">usable hosts</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-max" checked>
            <label for="checkbox-max">max hosts</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-network" checked>
            <label for="checkbox-network">network</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-first" checked>
            <label for="checkbox-first">first IP</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-last" checked>
            <label for="checkbox-last">last IP</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-broadcast" checked>
            <label for="checkbox-broadcast">broadcast</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-mask" checked>
            <label for="checkbox-mask">mask</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-prefix" checked>
            <label for="checkbox-prefix">prefix</label>
          </div>
          <div class="form-checkbox">
            <input type="checkbox" id="checkbox-next">
            <label for="checkbox-next">next</label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Network Block Address & Mask</legend>
        <div class="form-field">
          <div class="float-field">
            <input type="text" id="ip-block" class="float-input" placeholder="block address" required autofocus value="172.16.0.0">
            <label for="ip-block" class="float-label" data-content="block address">
              <span class="float-hidden">block address</span>
            </label>
          </div>
        </div>
        <div class="form-field">
          <div class="float-field">
            <input type="text" id="mask-block" class="float-input" placeholder="mask or prefix">
            <label for="ip-block" class="float-label" data-content="mask or prefix">
              <span class="float-hidden">mask or prefix</span>
            </label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Subnets' Details</legend>
        <div class="minplus">
          <button type="button" id="button-minus" class="button-mini">-</button>
          <button type="button" id="button-plus" class="button-mini">+</button>
        </div>

        <!--Dynamically populated. -->
        <div id="subnet-list"></div>

      </fieldset>

      <button type="button" id="button-generate">generate</button>
    </form>

    <!-- Dynamically populated. -->
    <div id="table-container" class="table-container"></div>

  </main>

  <footer>
    <div class="copyrightSection">
      <div class="col-md-12 text-center">
        <p>
          VLSM Calculator |
          <a href="https://github.com/safesploitOrg/vlsm-calculator" target="_blank" rel="noopener noreferrer">
            View on GitHub
          </a>
        </p>
      </div>
    </div>
  </footer>
</body>

</html>
