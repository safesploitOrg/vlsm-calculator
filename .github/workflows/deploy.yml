name: Deploy static content to Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare:
    name: Verify and package site
    if: >-
      ${{
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.event == 'push' &&
         github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write

    steps:
      - name: Checkout validated revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Revalidate deployment revision
        run: npm run check

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload public site for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public/
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed site
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: curl --fail --silent --show-error --retry 5 --retry-delay 5 --retry-all-errors "$PAGE_URL" > /dev/null
